<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrendForge AI</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container { max-width: 400px; margin: auto; padding-top: 10vh; }
        .auth-footer { text-align: center; margin-top: 1rem; color: var(--text-secondary); }
        .auth-footer a { color: var(--accent-color); text-decoration: none; font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }
        .flash-message { background: rgba(239, 68, 68, 0.2); color: #fca5a5; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid rgba(239, 68, 68, 0.3); text-align: center; }
    </style>
</head>
<body>
    <div class="container auth-container">
        <header>
            <h1>Trend<span class="highlight">Forge</span></h1>
            <p>Welcome back! Please log in.</p>
        </header>

        <main class="glass-panel">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-message">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="primary-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Log In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
            </div>
        </main>
    </div>
</body>
</html>
